# New-API Docker Compose Configuration
#
# Quick Start (PostgreSQL):
#   cp deploy/.env.example .env   # Edit passwords first!
#   docker-compose --profile postgres up -d
#
# Quick Start (MySQL):
#   cp deploy/.env.example .env   # Edit DB settings for MySQL
#   docker-compose --profile mysql up -d
#
# Access: http://localhost:3000 | Metrics: http://localhost:9090/metrics
#
# ⚠️  IMPORTANT: Copy .env.example to .env and change all default passwords before deploying to production!

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_PORT:-3000}:3000"
      - "${METRICS_PORT:-9090}:9090"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=${SQL_DSN:-postgresql://${DB_USER:-root}:${DB_PASSWORD:-123456}@postgres:5432/${DB_NAME:-new-api}}
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:-123456}@redis:6379
      - TZ=${TZ:-Asia/Shanghai}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - CRYPTO_SECRET=${CRYPTO_SECRET:-}
      - NODE_NAME=new-api-node-1
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - STREAMING_TIMEOUT=${STREAMING_TIMEOUT:-300}
      - RELAY_TIMEOUT=${RELAY_TIMEOUT:-0}
      - RELAY_MAX_IDLE_CONNS=${RELAY_MAX_IDLE_CONNS:-500}
      - RELAY_MAX_IDLE_CONNS_PER_HOST=${RELAY_MAX_IDLE_CONNS_PER_HOST:-100}
      - SYNC_FREQUENCY=${SYNC_FREQUENCY:-60}
      - DEBUG=${DEBUG:-false}
      - ENABLE_PPROF=${ENABLE_PPROF:-false}
      # Prometheus Metrics
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - METRICS_PORT=${METRICS_PORT:-9090}
      - METRICS_PATH=${METRICS_PATH:-/metrics}
      # OpenTelemetry Tracing
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_INSECURE=${OTEL_EXPORTER_OTLP_INSECURE:-true}
      # Canary Release
      - CANARY_ENABLED=${CANARY_ENABLED:-false}
    depends_on:
      - redis
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
        tag: "new-api|{{.Name}}"
    deploy:
      resources:
        limits:
          cpus: '${NEW_API_CPU_LIMIT:-2}'
          memory: ${NEW_API_MEM_LIMIT:-1GiB}
        reservations:
          cpus: '${NEW_API_CPU_RESERVATION:-0.2}'
          memory: ${NEW_API_MEM_RESERVATION:-256MiB}

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # PostgreSQL profile — default database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    profiles: ["postgres"]  # Enable with: docker-compose --profile postgres up -d
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-new-api}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"   # Uncomment or leave for local dev access
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-new-api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

  # MySQL profile — alternative database
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    profiles: ["mysql"]  # Enable with: docker-compose --profile mysql up -d
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-new-api}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"   # Uncomment for local dev access
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb-buffer-pool-size=256M
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  pg_data:
  mysql_data:
  redis_data:

networks:
  new-api-network:
    driver: bridge
