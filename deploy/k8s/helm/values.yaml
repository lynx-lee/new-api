# Default values for new-api Helm Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: calciumion/new-api
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is .Chart.AppVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: new-api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}
  # limits:
  #   cpu: "1"
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

extraEnv: []
extraEnvFrom: []
extraVolumeMounts: []
extraVolumes: []

nodeSelector: {}
tolerations: []
affinity: {}

# ---- Application Configuration ---

database:
  type: postgresql
  dsn: ""
  host: ""
  port: 5432
  database: new-api
  user: root
  password: ""

redis:
  enabled: true
  external:
    enabled: false
    host: ""
    port: 6379
    password: ""
    db: 0
  auth:
    password: ""
  poolSize: 10

sessionSecret: "" # MUST set for cluster mode, generate with: openssl rand -hex 32
cryptoSecret: ""

nodeType: master
nodeName: ""
syncFrequency: 60

batchUpdateEnabled: true
batchUpdateInterval: 5
timezone: Asia/Shanghai
logDir: /app/logs
errorLogEnabled: true
debug: false
enablePprof: false
memoryCacheEnabled: true

diskCache:
  enabled: false
  thresholdMB: 10
  maxSizeMB: 1024
  path: "/tmp/cache"

rateLimit:
  apiEnabled: true
  apiNum: 180
  apiDuration: 180
  webEnabled: true
  webNum: 60
  webDuration: 180
  criticalEnabled: true
  criticalNum: 20
  criticalDuration: 1200
  searchEnabled: true
  searchNum: 10
  searchDuration: 60

streamingTimeout: 300
relayTimeout: 0
relayMaxIdleConns: 500
relayMaxIdleConnsPerHost: 100

monitoring:
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
  openTelemetry:
    enabled: false
    endpoint: ""
    insecure: true
    headers: {}

postgresql:
  enabled: true
  auth:
    username: root
    password: "new-api-password"
    database: new-api
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    password: "new-api-redis-password"
  master:
    persistence:
      size: 5Gi
