# Default values for ai-bridge Helm Chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: quantumnous/ai-bridge
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is .Chart.AppVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 3000

# ============================================================
# Ingress — Nginx Ingress Controller (production-ready)
# ============================================================
ingress:
  enabled: false
  className: "nginx"
  annotations:
    # — Rate Limiting —
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "200"
    # — Timeouts (important for streaming LLM responses) —
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    # — Body size (large request payloads) —
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # — CORS / WebSocket —
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      # SSE / streaming response buffering
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
  hosts:
    - host: ai-bridge.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: ai-bridge-tls
  #    hosts:
  #      - ai-bridge.example.com

resources: {}
  # limits:
  #   cpu: "2"
  #   memory: 1Gi
  # requests:
  #   cpu: "200m"
  #   memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  enabled: true
  httpGet:
    path: /api/status
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

extraEnv: []
extraEnvFrom: []
extraVolumeMounts: []
extraVolumes: []

nodeSelector: {}
tolerations: []
affinity: {}

# ============================================================
# Application Configuration
# ============================================================

database:
  type: postgresql
  dsn: ""
  host: ""
  port: 5432
  database: ai-bridge
  user: root
  password: ""
  # External PostgreSQL Cluster mode
  external:
    enabled: false
    host: ""
    port: 5432
    database: ""
    user: ""
    password: ""
    sslMode: disable
    maxOpenConns: 100
    maxIdleConns: 20
    connMaxLifetime: 300

redis:
  enabled: true
  architecture: standalone  # standalone | cluster
  external:
    enabled: false
    host: ""
    port: 6379
    password: ""
    db: 0
  auth:
    password: ""
    poolSize: 10
  cluster:
    # When architecture=cluster, use these settings
    nodes: []  # e.g. ["redis-cluster-0.redis:6379", "redis-cluster-1.redis:6379", ...]
    password: ""
    poolSize: 20
    routeByLatency: false
  master:
    persistence:
      size: 5Gi
  replica:
    count: 0
    persistence:
      size: 2Gi

sessionSecret: "" # MUST set for cluster mode, generate with: openssl rand -hex 32
cryptoSecret: ""

nodeType: master
nodeName: ""
syncFrequency: 60

batchUpdateEnabled: true
batchUpdateInterval: 5
timezone: Asia/Shanghai
logDir: /app/logs
errorLogEnabled: true
debug: false
enablePprof: false
memoryCacheEnabled: true

diskCache:
  enabled: false
  thresholdMB: 10
  maxSizeMB: 1024
  path: "/tmp/cache"

rateLimit:
  apiEnabled: true
  apiNum: 180
  apiDuration: 180
  webEnabled: true
  webNum: 60
  webDuration: 180
  criticalEnabled: true
  criticalNum: 20
  criticalDuration: 1200
  searchEnabled: true
  searchNum: 10
  searchDuration: 60

streamingTimeout: 300
relayTimeout: 0
relayMaxIdleConns: 500
relayMaxIdleConnsPerHost: 100

monitoring:
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
  openTelemetry:
    enabled: false
    endpoint: ""
    insecure: true
    headers: {}

postgresql:
  enabled: true
  auth:
    username: root
    password: "ai-bridge-password"
    database: ai-bridge
  primary:
    persistence:
      size: 20Gi
