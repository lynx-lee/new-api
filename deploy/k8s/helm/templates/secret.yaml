apiVersion: v1
kind: Secret
metadata:
  name: {{ include "new-api.fullname" . }}-secret
  labels:
    {{- include "new-api.labels" . | nindent 4 }}
type: Opaque
data:
  # SESSION_SECRET is required for multi-node cluster deployment
  {{- if .Values.sessionSecret }}
  session-secret: {{ .Values.sessionSecret | b64enc | quote }}
  {{- else }}
  session-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.cryptoSecret }}
  crypto-secret: {{ .Values.cryptoSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.database.password }}
  db-password: {{ .Values.database.password | b64enc | quote }}
  {{- else if .Values.postgresql.enabled }}
  db-password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.redis.external.enabled }}
  redis-password: {{ .Values.redis.external.password | b64enc | quote }}
  {{- else if .Values.redis.auth.password }}
  redis-password: {{ .Values.redis.auth.password | b64enc | quote }}
  {{- else if .Values.redis.enabled }}
  redis-password: {{ .Values.redis.auth.password | default (randAlphaNum 16) | b64enc | quote }}
  {{- end }}
{{- end -}}
