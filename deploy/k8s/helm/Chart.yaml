apiVersion: v2
name: ai-bridge
description: A Kubernetes Helm Chart for AI-Bridge - the next-generation LLM gateway and AI asset management system
type: application
version: 1.0.0
appVersion: "latest"
maintainers:
  - name: QuantumNous
    url: https://github.com/QuantumNous/ai-bridge
home: https://github.com/QuantumNous/ai-bridge
keywords:
  - llm
  - api-gateway
  - ai
  - openai
  - chatgpt
  - claude
  - gemini
sources:
  - https://github.com/QuantumNous/ai-bridge

dependencies:
  - name: redis
    version: "^19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: postgresql
    version: "^15.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
